# Ablation rung 3: affine frozen at alpha=1/beta=0 AT CREATION, then tracked
# through normalize() rescaling (rescale_affine). Semantics: one shared
# init-time scale snapshot per image, no per-image correction — NOT raw
# metric trust (rescale-tracking erases the absolute-meters demand; the true
# raw-metric condition requires the alpha-anchored gauge, future work).
# Kicker (post-fix): 6.5mm / 0.119deg vs 4.8mm / 0.085deg with affine —
# per-image scale freedom is worth ~35% here.
# History: pre-rescale-fix this config produced 213mm / 2.65deg — frozen
# alpha fighting the drifting normalize scale frame; artifact, superseded.
sensor: depthpro
depth_space: log
depth_in_global: true
depth_in_local: false
sigma: 0.15
per_image_scale: false
per_image_shift: false
prior_sigma_alpha: null
prior_sigma_beta: null
alpha_init: unit
