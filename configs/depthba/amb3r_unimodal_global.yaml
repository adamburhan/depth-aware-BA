# First bimodal condition: patch-GMM max-mixture factors in global BA.
# depth_space MUST be linear: the gmm_patch sensor stores linear-meter
# sigmas and sigma-space conversion is not implemented (depth_context
# raises otherwise). sigma: 0.15 is dead here (rows carry sigmas).
sensor: amb3r
depth_space: linear
depth_in_global: true
depth_in_local: false
sigma: 0.15
per_image_scale: false
per_image_shift: false
prior_sigma_alpha: null
prior_sigma_beta: null
alpha_init: unit
