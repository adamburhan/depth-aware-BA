# Ablation rung 2: affine FROZEN at per-image median scale (alpha = median
# z/mu at the image's first BA, beta = 0, neither optimized), tracked
# through normalize() rescaling.
# Kicker (post-rescale-fix): 4.8mm / 0.085deg — INDISTINGUISHABLE from
# optimized affine: at full density, affine initialization is what matters,
# optimization adds nothing. (Pre-fix 9.2mm was the staleness confound.)
sensor: depthpro
depth_space: log
depth_in_global: true
depth_in_local: false
sigma: 0.15
per_image_scale: false
per_image_shift: false
prior_sigma_alpha: null
prior_sigma_beta: null
alpha_init: median
