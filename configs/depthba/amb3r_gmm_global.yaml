# First bimodal condition: patch-GMM max-mixture factors in global BA.
# depth_space log matches the sensor's log-space sigmas (gmm_patch fits in
# log; the only domain where the arbitrary SfM map scale cancels in the
# factor). sigma: 0.15 is dead here (rows carry sigmas).
sensor: amb3r_gmm
depth_space: log
depth_in_global: true
depth_in_local: false
sigma: 0.15
per_image_scale: false
per_image_shift: false
prior_sigma_alpha: null
prior_sigma_beta: null
alpha_init: median
